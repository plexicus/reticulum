id: "harden-sa-automount"
name: "ServiceAccount Token Automount"
description: "Detects if ServiceAccount automounts token"
severity: "medium"
tags: ["hardening", "serviceaccount"]
target: "values"
match:
  - key: "serviceAccount.automount"
    op: "eq"
    value: true
action:
  risk_profile:
    set_flag: "mountServiceToken"
    score_boost: 5

---

# v2 companion: explicitly disabling automount is a hardening signal.
# Uses set_flags (DSL v2) — flags can now be cleared, not only set.
id: "harden-sa-automount-secured"
name: "ServiceAccount Token Automount Disabled"
description: "Recognizes explicitly disabled token automount as hardened"
severity: "info"
tags: ["hardening", "serviceaccount"]
target: "values"
match:
  - key: "serviceAccount.automount"
    op: "eq"
    value: false
action:
  risk_profile:
    set_flags:
      mountServiceToken: false
