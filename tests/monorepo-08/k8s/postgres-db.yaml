apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-db
  labels:
    app: postgres-db
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      hostNetwork: true
      containers:
        - name: postgres
          image: postgres:14
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
spec:
  type: LoadBalancer
  selector:
    app: postgres-db
  ports:
    - port: 5432
