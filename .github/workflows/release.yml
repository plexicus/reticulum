name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: linux-arm64
          # Cross-compiled from the arm64 runner: GitHub retired the
          # Intel macos-13 runners, and Rust targets darwin-amd64 fine
          # from Apple Silicon.
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PKG="reticulum-${VERSION}-${{ matrix.artifact }}"
          mkdir -p "dist/${PKG}"
          cp "target/${{ matrix.target }}/release/reticulum" "dist/${PKG}/"
          cp -r rules "dist/${PKG}/rules"
          cp README.md LICENSE RULES.md "dist/${PKG}/"
          tar -czf "${PKG}.tar.gz" -C dist "${PKG}"
          shasum -a 256 "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: reticulum-${{ matrix.artifact }}
          path: |
            *.tar.gz
            *.tar.gz.sha256

  docker:
    name: Multi-arch image → GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  release:
    name: GitHub Release
    needs: [binaries, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.tar.gz.sha256
          generate_release_notes: true
          body: |
            ## Install

            **Docker (multi-arch):**
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            **Binary:** download the tarball for your platform below — it bundles
            the default rule set, README, RULES.md and LICENSE. Verify with the
            accompanying `.sha256` file.
