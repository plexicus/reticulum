name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: End-to-end smoke (raw K8s traceability)
        run: |
          ./target/release/reticulum -p tests/monorepo-08 --scan-only \
            -o /tmp/scan-08.json --graph /tmp/graph-08.mmd
          python3 - <<'EOF'
          import json
          d = json.load(open("/tmp/scan-08.json"))
          svc = {s["id"]: s for s in d["services"]}
          rp = svc["web-frontend"]["riskProfile"]
          assert rp["isPublic"], "web-frontend must be public via Ingress chain"
          assert rp["exposurePaths"] == [
              "Ingress/web-ingress → Service/web-svc → Deployment/web-frontend"
          ], rp["exposurePaths"]
          assert svc["internal-batch"]["riskProfile"]["isPrivileged"]
          assert svc["postgres-db"]["riskProfile"]["isPublic"]
          print("monorepo-08 traceability OK")
          EOF

      - name: End-to-end smoke (SARIF scoring)
        run: |
          ./target/release/reticulum -p tests/monorepo-06 \
            -s tests/fixtures/synthetic-trivy.sarif -o /tmp/full-06.json
          python3 - <<'EOF'
          import json
          d = json.load(open("/tmp/full-06.json"))
          scores = {s["id"]: s["maxReticulumScore"] for s in d["services"]}
          expected = {"admin-api": 100, "internal-worker": 49, "payment-go": 22, "postgres-db": 35}
          assert scores == expected, scores
          print("monorepo-06 scoring OK", scores)
          EOF

      - name: End-to-end smoke (env selector + path allowlist)
        run: |
          ./target/release/reticulum -p tests/monorepo-10 --scan-only -o /tmp/scan-10-union.json
          ./target/release/reticulum -p tests/monorepo-10 --scan-only --env prod -o /tmp/scan-10-prod.json
          ./target/release/reticulum -p tests/monorepo-10 --scan-only --exclude "examples/**" -o /tmp/scan-10-excluded.json
          python3 - <<'EOF'
          import json

          union = {s["id"]: s for s in json.load(open("/tmp/scan-10-union.json"))["services"]}
          prod = {s["id"]: s for s in json.load(open("/tmp/scan-10-prod.json"))["services"]}
          excluded = {s["id"]: s for s in json.load(open("/tmp/scan-10-excluded.json"))["services"]}

          # No --env: union of every overlay — dev's ingress.enabled leaks in.
          assert union["internal-api"]["riskProfile"]["isPublic"], "union must merge the dev overlay"
          # --env prod: only base + prod overlay considered — stays internal.
          assert not prod["internal-api"]["riskProfile"]["isPublic"], "prod-only view must stay internal"
          # No --exclude: the examples/ decoy is discovered like any other manifest.
          assert union["decoy-workload"]["riskProfile"]["isPrivileged"]
          # --exclude examples/**: the decoy never contributes a service.
          assert "decoy-workload" not in excluded, "excluded path must not contribute a service"
          print("monorepo-10 env selector + path allowlist OK")
          EOF

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t reticulum:ci .
      - name: Smoke run
        run: docker run --rm -v "$PWD:/data" reticulum:ci -p /data/tests/monorepo-06 --scan-only --rules /app/rules
