name: Test, Build & Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
        enable-cache: true

    - name: Create virtual environment
      run: uv venv

    - name: Install dependencies
      run: |
        source .venv/bin/activate
        uv pip install -e ".[dev]"
      timeout-minutes: 15

    - name: Generate test repository
      run: |
        source .venv/bin/activate
        python scripts/create-test-repo.py
      timeout-minutes: 5

    - name: Verify Docker availability
      run: |
        echo "🔍 Testing Docker availability..."
        docker --version
        docker info
        echo "✅ Docker is available"
      timeout-minutes: 2

    - name: Run tests
      run: |
        source .venv/bin/activate
        pytest
      timeout-minutes: 10

    - name: Lint with ruff
      run: |
        source .venv/bin/activate
        ruff check src/
      timeout-minutes: 5

    - name: Format check with black
      run: |
        source .venv/bin/activate
        black --check src/
      timeout-minutes: 5

  create-release:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write  # For creating releases
      pull-requests: read  # For generating release notes
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Generate Changelog
      id: changelog
      run: |
        # Get commits since last tag
        if [ "${{ github.ref_name }}" != "v0.1.0" ]; then
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo "v0.1.0")
        else
          PREVIOUS_TAG=""
        fi
        
        if [ -n "$PREVIOUS_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s" $PREVIOUS_TAG..${{ github.ref_name }} | head -20)
        else
          CHANGELOG=$(git log --pretty=format:"- %s" --oneline | head -20)
        fi
        
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## What's Changed

          ${{ steps.changelog.outputs.CHANGELOG }}

          ## Installation

          ```bash
          pip install reticulum
          ```

          ## Usage

          ```bash
          reticulum /path/to/repo                 # Generate prioritization report
          reticulum /path/to/repo --json          # Pretty JSON output (formatted like jq)
          reticulum /path/to/repo --dot diagram.dot  # Export network topology as DOT file
          ```

  build-and-publish:
    needs: [test, create-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"
    
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Install build tools
      run: uv pip install --system build

    - name: Build package
      run: python -m build
      timeout-minutes: 10
    
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
        skip-existing: true
        verbose: true
      timeout-minutes: 15
